name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build (Left)
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=roba_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: West Build (Right)
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=roba_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename firmware files
        run: |
          cp build/zephyr/zmk.uf2 roba_left.uf2
          # 右側のビルド結果を上書きしないよう、一度別名で保存するか、ビルドディレクトリを分ける必要がありますが、
          # まずは左側が成功するか確認しましょう。
          
      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"
          